<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="뒤집기">
<meta name="theme-color" content="#6eb5a6">
<title>글자 뒤집기</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#6eb5a6;--teal-dk:#586e69;--teal-lt:#b0cfc8;
  --mint:#e9f5f2;--sage:#dfe6d3;--text:#2a2e2c;--text-lt:#697870;
  --muted:#959e9c;--gray:#c4c4c4;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--mint);color:var(--text);min-height:100dvh;padding-bottom:56px;-webkit-tap-highlight-color:transparent}

/* TAB BAR */
.tab-bar{display:flex;background:#fff;border-bottom:1px solid var(--teal-lt);position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.tab{flex:1;padding:14px 8px 12px;text-align:center;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;font-family:'Noto Sans KR',sans-serif;background:none;border-top:none;border-left:none;border-right:none}
.tab .ti{font-size:20px;display:block;margin-bottom:2px}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}

/* PAGES */
.page{display:none;padding:16px;max-width:480px;margin:0 auto;flex-direction:column;gap:14px}
.page.active{display:flex}

/* CARD */
.card{background:#fff;border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
.lbl{font-size:11px;font-weight:700;color:var(--teal-dk);margin-bottom:10px;text-transform:uppercase;letter-spacing:.4px}

/* TEXTAREA */
textarea{width:100%;border:2px solid var(--teal-lt);border-radius:10px;padding:12px 14px;font-size:18px;font-family:'Noto Sans KR',sans-serif;font-weight:700;resize:vertical;outline:none;color:var(--text);background:var(--mint);transition:border-color .2s;min-height:72px}
textarea:focus{border-color:var(--teal)}

/* CHIPS */
.chip-row{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 14px;border-radius:50px;border:2px solid var(--gray);background:#fff;color:var(--text-lt);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}
.chip.active{border-color:var(--teal);background:var(--teal);color:#fff}

/* FLIP BUTTONS */
.flip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.flip-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 4px;border-radius:12px;border:2px solid var(--gray);background:#fff;color:var(--text-lt);font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;gap:4px;transition:all .15s}
.flip-btn .icon{font-size:22px}
.flip-btn.active{border-color:var(--teal);background:var(--teal);color:#fff}

/* COLOR DOTS */
.color-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.color-dot{width:36px;height:36px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:transform .15s,border-color .15s;flex-shrink:0}
.color-dot.active{border-color:var(--teal);transform:scale(1.2)}
.td{background:repeating-conic-gradient(#ccc 0% 25%,#fff 0% 50%) 0 0/10px 10px}

/* SLIDER */
.sl-row{display:flex;align-items:center;gap:12px}
input[type=range]{flex:1;accent-color:var(--teal);height:4px;cursor:pointer}
.sl-val{font-size:14px;font-weight:700;color:var(--teal);min-width:44px;text-align:right}

/* PREVIEW */
.prev-wrap{background:repeating-conic-gradient(#ddd 0% 25%,#f5f5f5 0% 50%) 0 0/16px 16px;border-radius:12px;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100px;overflow:auto}
#canvas{max-width:100%;border-radius:8px;display:block}

/* BUTTONS */
.btn-p{width:100%;padding:18px;border-radius:var(--radius);border:none;background:var(--teal);color:#fff;font-size:17px;font-weight:900;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(110,181,166,.3);letter-spacing:-.3px}
.btn-p:active{transform:scale(.97);filter:brightness(.92)}
.btn-p.done{background:var(--teal-dk)}

/* QR HERO */
.qr-hero{background:linear-gradient(135deg,var(--teal-dk) 0%,var(--teal) 100%);border-radius:var(--radius);padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:16px;box-shadow:0 4px 20px rgba(88,110,105,.25)}
.qr-title{color:#fff;font-size:18px;font-weight:900;text-align:center;letter-spacing:-.5px}
.qr-sub{color:rgba(255,255,255,.85);font-size:13px;text-align:center}
.qr-box{background:#fff;border-radius:16px;padding:20px;display:flex;justify-content:center;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.12);position:relative}
.qr-box::before,.qr-box::after{content:'';position:absolute;width:20px;height:20px;border-color:var(--teal);border-style:solid}
.qr-box::before{top:8px;left:8px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.qr-box::after{bottom:8px;right:8px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
#qrcode{display:flex;justify-content:center}
.url-disp{background:rgba(255,255,255,.15);border-radius:10px;padding:10px 14px;color:#fff;font-size:12px;text-align:center;word-break:break-all;border:1px solid rgba(255,255,255,.25);width:100%}

/* QR SIZE */
.sz-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sz-btn{padding:10px 4px;border-radius:10px;border:2px solid var(--gray);background:#fff;color:var(--text-lt);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s}
.sz-btn.active{border-color:var(--teal);background:var(--teal);color:#fff}

/* SHARE GRID */
.sh-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sh-btn{padding:14px 8px;border-radius:12px;border:none;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s}
.sh-btn .si{font-size:24px}
.sh-btn:active{transform:scale(.95)}
.sh-dl{background:var(--teal);color:#fff}
.sh-cp{background:var(--sage);color:var(--teal-dk)}
.sh-kk{background:#FAE100;color:#3C1E1E}
.sh-na{background:var(--teal-lt);color:var(--teal-dk)}

/* URL INPUT */
.url-wrap{display:flex;gap:8px;align-items:center}
.url-in{flex:1;border:2px solid var(--teal-lt);border-radius:10px;padding:10px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;color:var(--text);background:var(--mint)}
.url-in:focus{border-color:var(--teal)}
.url-apply{padding:10px 14px;border-radius:10px;border:none;background:var(--teal);color:#fff;font-weight:700;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap}

/* STEPS */
.step{display:flex;gap:12px;align-items:flex-start}
.step-n{background:var(--teal);color:#fff;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.step-t{font-size:14px;color:var(--text);line-height:1.5}

/* TOAST */
.toast{position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--teal-dk);color:#fff;padding:12px 22px;border-radius:50px;font-size:14px;font-weight:700;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hint{text-align:center;font-size:12px;color:var(--muted);padding-top:2px}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab active" onclick="switchTab('flip')">
    <span class="ti">✨</span>뒤집기
  </button>
  <button class="tab" onclick="switchTab('qr')">
    <span class="ti">📲</span>QR 공유
  </button>
</div>

<!-- 뒤집기 탭 -->
<div class="page active" id="page-flip">
  <div class="card">
    <div class="lbl">📝 텍스트 입력</div>
    <textarea id="textInput" rows="2" placeholder="뒤집을 내용을 입력하세요...">랭킹 1위</textarea>
  </div>
  <div class="card">
    <div class="lbl">🔄 뒤집기 방향</div>
    <div class="flip-grid">
      <button class="flip-btn active" data-flip="flipX"><span class="icon">↔️</span><span>좌우반전</span></button>
      <button class="flip-btn" data-flip="flipY"><span class="icon">↕️</span><span>상하반전</span></button>
      <button class="flip-btn" data-flip="rotate"><span class="icon">🔃</span><span>180도</span></button>
    </div>
  </div>
  <div class="card">
    <div class="lbl">🔤 글자 크기</div>
    <div class="sl-row">
      <input type="range" id="fontSizeSlider" min="24" max="160" value="72">
      <span class="sl-val" id="fontSizeVal">72px</span>
    </div>
  </div>
  <div class="card">
    <div class="lbl">💪 굵기</div>
    <div class="chip-row">
      <button class="chip" data-weight="400">보통</button>
      <button class="chip" data-weight="700">두꺼움</button>
      <button class="chip active" data-weight="900">최대</button>
    </div>
  </div>
  <div class="card">
    <div class="lbl">🎨 배경색</div>
    <div class="color-row">
      <div class="color-dot active" data-bg="#111111" style="background:#111111" title="검정"></div>
      <div class="color-dot" data-bg="#ffffff" style="background:#fff;box-shadow:inset 0 0 0 1px #ddd" title="흰색"></div>
      <div class="color-dot" data-bg="#FAE100" style="background:#FAE100" title="카카오노랑"></div>
      <div class="color-dot" data-bg="#e9f5f2" style="background:#e9f5f2;box-shadow:inset 0 0 0 1px #ddd" title="민트"></div>
      <div class="color-dot" data-bg="#6eb5a6" style="background:#6eb5a6" title="틸"></div>
      <div class="color-dot td" data-bg="transparent" title="투명"></div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">✏️ 글자색</div>
    <div class="color-row">
      <div class="color-dot active" data-tc="#ffffff" style="background:#fff;box-shadow:inset 0 0 0 1px #ddd" title="흰색"></div>
      <div class="color-dot" data-tc="#111111" style="background:#111111" title="검정"></div>
      <div class="color-dot" data-tc="#FAE100" style="background:#FAE100" title="노랑"></div>
      <div class="color-dot" data-tc="#6eb5a6" style="background:#6eb5a6" title="틸"></div>
      <div class="color-dot" data-tc="#E8A200" style="background:#E8A200" title="골드"></div>
    </div>
  </div>
  <div class="card">
    <div class="lbl">📐 여백</div>
    <div class="sl-row">
      <input type="range" id="paddingSlider" min="8" max="80" value="32">
      <span class="sl-val" id="paddingVal">32px</span>
    </div>
  </div>
  <div class="card">
    <div class="lbl">👀 미리보기</div>
    <div class="prev-wrap"><canvas id="canvas"></canvas></div>
  </div>
  <button class="btn-p" id="downloadBtn">📥 이미지 저장하기</button>
  <p class="hint">저장 후 카카오톡에서 이미지로 전송 📲</p>
</div>

<!-- QR 공유 탭 -->
<div class="page" id="page-qr">
  <div class="qr-hero">
    <div class="qr-title">📲 이 앱을 친구에게 공유하세요!</div>
    <div class="qr-sub">QR코드를 스캔하면 바로 설치 가능해요</div>
    <div class="qr-box">
      <div id="qrcode"></div>
    </div>
    <div class="url-disp" id="urlDisplay">앱 주소 로딩 중...</div>
  </div>

  <div class="card">
    <div class="lbl">🔗 앱 주소 설정</div>
    <div class="url-wrap">
      <input class="url-in" id="customUrl" type="url" placeholder="https://jinwooshon-coder.github.io/flip-text">
      <button class="url-apply" onclick="applyCustomUrl()">적용</button>
    </div>
    <p class="hint" style="margin-top:8px">GitHub Pages 배포 후 주소를 여기에 입력하세요</p>
  </div>

  <div class="card">
    <div class="lbl">📐 QR 크기</div>
    <div class="sz-row">
      <button class="sz-btn" data-size="160">작게</button>
      <button class="sz-btn active" data-size="220">보통</button>
      <button class="sz-btn" data-size="300">크게</button>
    </div>
  </div>

  <div class="card">
    <div class="lbl">🚀 공유하기</div>
    <div class="sh-grid">
      <button class="sh-btn sh-dl" onclick="downloadQR()"><span class="si">⬇️</span>QR 저장</button>
      <button class="sh-btn sh-cp" onclick="copyUrl()"><span class="si">🔗</span>주소 복사</button>
      <button class="sh-btn sh-kk" onclick="kakaoShare()"><span class="si">💬</span>카카오</button>
      <button class="sh-btn sh-na" onclick="nativeShare()"><span class="si">📤</span>더 보내기</button>
    </div>
  </div>

  <div class="card">
    <div class="lbl">📱 설치 방법</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="step">
        <div class="step-n">1</div>
        <div class="step-t">QR코드 스캔 또는 주소 복사 → 크롬으로 열기</div>
      </div>
      <div class="step">
        <div class="step-n">2</div>
        <div class="step-t">주소창 옆 <b>⋮</b> 메뉴 → <b>"홈 화면에 추가"</b> 탭</div>
      </div>
      <div class="step">
        <div class="step-n">3</div>
        <div class="step-t">🎉 앱처럼 실행! 오프라인에서도 작동해요</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── FLIP ──
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const S={text:'랭킹 1위',flip:'flipX',fontSize:72,fontWeight:'900',bgColor:'#111111',textColor:'#ffffff',padding:32};

function draw(){
  const font=`${S.fontWeight} ${S.fontSize}px 'Noto Sans KR',sans-serif`;
  ctx.font=font;
  const lines=S.text.split('\n'),lh=S.fontSize*1.35;
  let maxW=0;lines.forEach(l=>{const m=ctx.measureText(l);if(m.width>maxW)maxW=m.width;});
  const W=Math.max(maxW+S.padding*2,80),H=lh*lines.length+S.padding*2;
  canvas.width=W;canvas.height=H;
  if(S.bgColor==='transparent')ctx.clearRect(0,0,W,H);
  else{ctx.fillStyle=S.bgColor;ctx.fillRect(0,0,W,H);}
  ctx.save();ctx.font=font;ctx.fillStyle=S.textColor;ctx.textBaseline='middle';
  if(S.flip==='flipX'){ctx.translate(W,0);ctx.scale(-1,1);}
  else if(S.flip==='flipY'){ctx.translate(0,H);ctx.scale(1,-1);}
  else{ctx.translate(W,H);ctx.rotate(Math.PI);}
  lines.forEach((l,i)=>ctx.fillText(l,S.padding,S.padding+lh*i+lh/2));
  ctx.restore();
}

document.getElementById('textInput').addEventListener('input',e=>{S.text=e.target.value||' ';draw();});
document.querySelectorAll('.flip-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.flip-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');S.flip=b.dataset.flip;draw();
}));
document.getElementById('fontSizeSlider').addEventListener('input',e=>{
  S.fontSize=+e.target.value;document.getElementById('fontSizeVal').textContent=S.fontSize+'px';draw();
});
document.getElementById('paddingSlider').addEventListener('input',e=>{
  S.padding=+e.target.value;document.getElementById('paddingVal').textContent=S.padding+'px';draw();
});
document.querySelectorAll('.chip[data-weight]').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip[data-weight]').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');S.fontWeight=c.dataset.weight;draw();
}));
document.querySelectorAll('.color-dot[data-bg]').forEach(d=>d.addEventListener('click',()=>{
  document.querySelectorAll('.color-dot[data-bg]').forEach(x=>x.classList.remove('active'));
  d.classList.add('active');S.bgColor=d.dataset.bg;draw();
}));
document.querySelectorAll('.color-dot[data-tc]').forEach(d=>d.addEventListener('click',()=>{
  document.querySelectorAll('.color-dot[data-tc]').forEach(x=>x.classList.remove('active'));
  d.classList.add('active');S.textColor=d.dataset.tc;draw();
}));
document.getElementById('downloadBtn').addEventListener('click',()=>{
  const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='뒤집힌글자.png';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  const btn=document.getElementById('downloadBtn');
  btn.textContent='✅ 저장됨! 카카오로 보내세요~';btn.classList.add('done');
  setTimeout(()=>{btn.textContent='📥 이미지 저장하기';btn.classList.remove('done');},2500);
});

// ── QR ──
let curUrl=window.location.href,qrSize=220,qrObj=null;

function buildQR(url,size){
  const el=document.getElementById('qrcode');el.innerHTML='';
  qrObj=new QRCode(el,{text:url,width:size,height:size,colorDark:'#2a2e2c',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('urlDisplay').textContent=url;
  document.getElementById('customUrl').value=url;
}
function applyCustomUrl(){
  const v=document.getElementById('customUrl').value.trim();
  if(v){curUrl=v;buildQR(curUrl,qrSize);showToast('✅ QR 업데이트됨!');}
}
document.querySelectorAll('.sz-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.sz-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');qrSize=+b.dataset.size;buildQR(curUrl,qrSize);
}));

function getQRCanvas(){return document.querySelector('#qrcode canvas');}

function downloadQR(){
  const qc=getQRCanvas();if(!qc)return;
  const pad=24,lh=44,out=document.createElement('canvas');
  out.width=qc.width+pad*2;out.height=qc.height+pad*2+lh;
  const c=out.getContext('2d');
  c.fillStyle='#ffffff';c.fillRect(0,0,out.width,out.height);
  c.drawImage(qc,pad,pad);
  c.fillStyle='#6eb5a6';c.fillRect(0,out.height-lh,out.width,lh);
  c.fillStyle='#ffffff';c.font='700 15px Noto Sans KR,sans-serif';
  c.textAlign='center';c.textBaseline='middle';
  c.fillText('✨ 글자 뒤집기 앱',out.width/2,out.height-lh/2);
  const a=document.createElement('a');a.href=out.toDataURL('image/png');a.download='글자뒤집기-QR.png';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showToast('📥 QR 이미지 저장됨!');
}
function copyUrl(){
  navigator.clipboard.writeText(curUrl).then(()=>showToast('🔗 주소 복사됨!')).catch(()=>{prompt('주소를 복사하세요:',curUrl);});
}
function kakaoShare(){
  if(navigator.share){navigator.share({title:'✨ 글자 뒤집기 앱',text:'뒤집힌 글자 이미지를 만들어보세요!',url:curUrl});}
  else{copyUrl();showToast('💬 주소 복사됨 → 카카오에 붙여넣기!');}
}
function nativeShare(){
  if(navigator.share){navigator.share({title:'✨ 글자 뒤집기 앱',text:'카카오로 보낼 뒤집힌 글자를 만들어보세요!',url:curUrl}).catch(()=>{});}
  else{copyUrl();}
}

// ── TABS ──
function switchTab(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  document.querySelectorAll('.tab')[tab==='flip'?0:1].classList.add('active');
}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}
